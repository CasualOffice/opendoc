name: Security

on:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rustsec:
    name: rustsec
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Install cargo-audit
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7
        with:
          tool: cargo-audit@0.22.2
          fallback: none
      - name: Check RustSec advisories
        run: cargo audit --deny warnings
      - name: Check fuzz RustSec advisories
        run: cargo audit --file fuzz/Cargo.lock --deny warnings

  dependency-policy:
    name: dependency-policy
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Install cargo-deny
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7
        with:
          tool: cargo-deny@0.20.2
          fallback: none
      - name: Check all dependency policies
        run: cargo deny --locked check
      - name: Check fuzz dependency policies
        run: cargo deny --manifest-path fuzz/Cargo.toml --locked check

  docx-package-fuzz:
    name: docx-package-fuzz
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Install pinned nightly Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: nightly-2026-07-20
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7
        with:
          tool: cargo-fuzz@0.13.2
          fallback: none
      - name: Prepare disposable seed corpus
        run: |
          mkdir -p target/fuzz-corpus/docx_package
          cp fixtures/generated/*.docx target/fuzz-corpus/docx_package/
      - name: Run bounded DOCX package campaign
        run: >-
          cargo +nightly-2026-07-20 fuzz run docx_package
          target/fuzz-corpus/docx_package --
          -max_total_time=60
          -timeout=5
          -max_len=1048576
          -rss_limit_mb=2048
      - name: Verify fuzz lockfile remains unchanged
        run: git diff --exit-code -- fuzz/Cargo.lock
